# Local development environment for the Recipes API.
#
# Starts DynamoDB Local (an in-memory emulator of AWS DynamoDB) and creates
# the Recipes table so the app can be tested locally without an AWS account.
#
# Usage:
#   docker compose up        — start DynamoDB Local and create the table
#   docker compose down      — stop and remove containers
#
# Once running, start the API with:
#   sam build
#   sam local start-api --env-vars env.json
#
# The API will be available at http://localhost:3000.
# DynamoDB Local is available at http://localhost:8000.

services:

  # DynamoDB Local — emulates AWS DynamoDB on your machine.
  # Data is in-memory only and is lost when the container stops.
  dynamodb-local:
    image: amazon/dynamodb-local:latest
    container_name: recipes-dynamodb-local
    command: "-jar DynamoDBLocal.jar -inMemory -sharedDb"
    ports:
      - "8000:8000"
  # One-shot setup container — creates the Recipes table once DynamoDB Local is accepting connections.
  # Retries until the table is created, then exits.
  dynamodb-setup:
    image: amazon/aws-cli:latest
    depends_on:
      - dynamodb-local
    environment:
      AWS_ACCESS_KEY_ID: test
      AWS_SECRET_ACCESS_KEY: test
      AWS_DEFAULT_REGION: us-east-1
    entrypoint:
      - sh
      - -c
      - |
        until aws dynamodb create-table --table-name Recipes --attribute-definitions AttributeName=id,AttributeType=S --key-schema AttributeName=id,KeyType=HASH --billing-mode PAY_PER_REQUEST --endpoint-url http://dynamodb-local:8000 2>/dev/null; do
          echo 'Waiting for DynamoDB Local...'; sleep 2;
        done
