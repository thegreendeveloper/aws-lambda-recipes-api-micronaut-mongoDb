# Local development environment for the Recipes API.
#
# Starts a local MongoDB instance for local testing without a MongoDB Atlas account.
#
# Usage:
#   docker compose up        — start MongoDB
#   docker compose down      — stop and remove containers
#
# Once running, start the API with:
#   sam build
#   sam local start-api --env-vars env.json
#
# The API will be available at http://localhost:3000.
# MongoDB is available at mongodb://localhost:27017.

services:

  # MongoDB — local instance for development and testing.
  # Data is persisted in a named volume; remove the volume to reset.
  mongodb:
    image: mongo:7
    container_name: recipes-mongodb
    ports:
      - "27017:27017"
    environment:
      MONGO_INITDB_DATABASE: recipes
    volumes:
      - recipes-mongo-data:/data/db

volumes:
  recipes-mongo-data:
